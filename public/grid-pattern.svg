<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="0.5"/>
      <circle cx="0" cy="0" r="0.5" fill="rgba(139,92,246,0.2)"/>
    </pattern>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(139,92,246,0.1)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="100%" stop-color="rgba(45,212,191,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" fill="url(#grid)" />
  <rect width="100" height="100" fill="url(#glow)" opacity="0.3"/>
</svg>